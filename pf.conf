# OpenBSD pf.conf - Clean and Concise - Dual Stack (IPv4 + IPv6)

# --- Macros ---
lan = "ix0"

# --- Tables ---
# Martian (unroutable) addresses - IPv4
table <martians> {
    0.0.0.0/8 10.0.0.0/8 100.64.0.0/10 127.0.0.0/8 169.254.0.0/16
    172.16.0.0/12 192.0.0.0/24 192.0.2.0/24 192.168.0.0/16
    198.18.0.0/15 198.51.100.0/24 203.0.113.0/24 224.0.0.0/3
}

# Martian (unroutable) addresses - IPv6
table <martians6> {
    ::/128 ::1/128 ::ffff:0:0/96
    64:ff9b::/96 64:ff9b:1::/48
    100::/64 2001::/23 2001:0::/32 2001:2::/48
    2001:10::/28 2001:20::/28 2001:db8::/32
    2002::/16 fc00::/7 fec0::/10
}

# --- Global Options ---
set block-policy drop
set loginterface egress
set skip on lo

# --- Match Rules (Translation) ---
# Normalization: Clamp MSS only on the egress interface.
match in all scrub (no-df random-id)
match out on egress scrub (max-mss 1440)

# Outbound NAT for internet access (IPv4 only)
match out on egress inet from !(egress:network) to any nat-to (egress:0)

# --- Filter Rules ---
# Anti-spoofing
antispoof quick for { egress $lan }

# Block martian addresses (IPv4/IPv6)
block in quick on egress inet from <martians> to any
block return out quick on egress inet from any to <martians>
block in quick on egress inet6 from <martians6> to any
block return out quick on egress inet6 from any to <martians6>

# Default deny everything else
block log all

# Allow anything out to the internet
pass out quick inet
pass out quick inet6

# Allow general LAN traffic in (Preserves 'last match wins' for internal rules)
pass in on $lan

# ICMP diagnostics strictly bound to WAN ingress
# IPv4 is safely bound to the unicast interface IP
pass in quick on egress inet proto icmp from any to (egress) icmp-type { echoreq, unreach }

# IPv6 restricted to the firewall's IPs AND link-local multicast
# This permits ISP gateway routing (NDP/RA) but protects internal LAN global IPs
pass in quick on egress inet6 proto ipv6-icmp from any to { (egress), ff02::/16 } icmp6-type { \
    echoreq, echorep, unreach, toobig, timex, paramprob, \
    neighbrsol, neighbradv, routersol, routeradv \
}

# DHCPv6 client allow (Prefix Delegation)
pass in quick on egress inet6 proto udp from any port 547 to any port 546
